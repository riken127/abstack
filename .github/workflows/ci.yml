name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset native

      - name: Build
        run: cmake --build --preset native

      - name: Test
        run: ctest --test-dir build/native --output-on-failure
